spring:
  mysql:
    datasource:
      jdbcUrl: jdbc:mysql://localhost:3306/studentdb
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect

  postgres:
    datasource:
      jdbcUrl: jdbc:postgresql://localhost:5432/studentinfo
      username: postgres
      password: root
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
